<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Meta do Motorista</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background: linear-gradient(135deg,#020617,#0f172a,#1e293b);
}
.glass{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(16px);
border:1px solid rgba(255,255,255,0.15);
}
.input{
background: rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
color:white;
}
</style>

</head>

<body class="text-white min-h-screen flex items-center justify-center p-6">

<div class="glass w-full max-w-xl p-8 rounded-3xl shadow-2xl">

<h1 class="text-3xl font-bold text-center mb-6">
Meta do Motorista
</h1>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

<input id="meta" placeholder="Meta de lucro" class="input p-2 rounded-lg">
<input id="valorKm" placeholder="Valor por km" class="input p-2 rounded-lg">
<input id="gasolina" placeholder="Preço gasolina" class="input p-2 rounded-lg">
<input id="consumo" placeholder="Consumo km/L" class="input p-2 rounded-lg">
<input id="valorHora" placeholder="Valor por hora" class="input p-2 rounded-lg">
<input id="ganhoAtual" placeholder="Ganho atual hoje" class="input p-2 rounded-lg">
<input id="inicio" type="time" class="input p-2 rounded-lg">
<input id="descanso" placeholder="Horas descanso" class="input p-2 rounded-lg">

<div class="flex items-center gap-2 md:col-span-2">
<input id="ar" type="checkbox">
<label>Ar condicionado ligado (+10% consumo)</label>
</div>

</div>

<button onclick="calcular()"
class="mt-6 w-full bg-gradient-to-r from-blue-500 to-indigo-600 p-3 rounded-xl font-semibold">
Calcular
</button>

<button onclick="mostrarDicas()"
class="mt-3 w-full bg-gray-700 p-2 rounded-lg text-sm">
Ver dicas de condução
</button>

<div class="mt-6">

<div class="w-full bg-gray-700 rounded-full h-4 overflow-hidden">
<div id="barra" class="bg-green-400 h-4 w-0 transition-all"></div>
</div>

<p id="progressoTexto" class="text-sm mt-2"></p>

</div>

</div>

<!-- POPUP RESULTADO -->

<div id="popup" class="fixed inset-0 bg-black/60 hidden items-center justify-center">

<div class="glass p-6 rounded-2xl w-96">

<h2 class="text-xl font-bold mb-3">Resultado</h2>

<div id="resultado" class="space-y-2 text-sm"></div>

<button onclick="fecharPopup()"
class="mt-4 w-full bg-blue-500 p-2 rounded-lg">
Fechar
</button>

</div>

</div>


<!-- POPUP DICAS -->

<div id="dicasPopup" class="fixed inset-0 bg-black/60 hidden items-center justify-center">

<div class="glass p-6 rounded-xl w-80 text-sm relative">

<button onclick="fecharDicas()"
class="absolute top-2 right-3 text-xl">
✖
</button>

<p class="font-semibold mb-3 text-lg">
Dicas de economia
</p>

<ul class="space-y-2 text-sm">

<li>🚗 Velocidade ideal urbana: <b>40–60 km/h</b></li>

<li>⚡ Evite aceleração brusca</li>

<li>⛽ Mantenha pneus calibrados</li>

<li>❄️ Use ar condicionado com moderação</li>

<li>🛑 Antecipe frenagens</li>

<li>📉 Menos rotação = menos consumo</li>

</ul>

</div>

</div>


<script>

function salvarCache(){

localStorage.setItem("dadosMotorista", JSON.stringify({

meta:meta.value,
valorKm:valorKm.value,
gasolina:gasolina.value,
consumo:consumo.value,
valorHora:valorHora.value,
ganhoAtual:ganhoAtual.value,
inicio:inicio.value,
descanso:descanso.value,
ar:ar.checked

}));

}

function carregarCache(){

let dados = JSON.parse(localStorage.getItem("dadosMotorista"));

if(!dados) return;

meta.value = dados.meta;
valorKm.value = dados.valorKm;
gasolina.value = dados.gasolina;
consumo.value = dados.consumo;
valorHora.value = dados.valorHora;
ganhoAtual.value = dados.ganhoAtual;
inicio.value = dados.inicio;
descanso.value = dados.descanso;
ar.checked = dados.ar;

}

function calcular(){

salvarCache();

let metaV = parseFloat(meta.value);
let valorKmV = parseFloat(valorKm.value);
let gasolinaV = parseFloat(gasolina.value);
let consumoV = parseFloat(consumo.value);
let valorHoraV = parseFloat(valorHora.value);
let descansoV = parseFloat(descanso.value) || 0;
let ganhoAtualV = parseFloat(ganhoAtual.value) || 0;
let inicioV = inicio.value;

if(ar.checked){
consumoV *= 0.9;
}

let custoKm = gasolinaV / consumoV;

let lucroKm = valorKmV - custoKm;

let falta = metaV - ganhoAtualV;

if(falta < 0) falta = 0;

let kmNecessarios = falta / lucroKm;

let litros = kmNecessarios / consumoV;

let custoComb = litros * gasolinaV;

let faturamento = kmNecessarios * valorKmV;

let horasTrabalho = faturamento / valorHoraV;

let horasTotais = horasTrabalho + descansoV;

let horarioFinal = "";

if(inicioV){

let partes = inicioV.split(":");

let data = new Date();

data.setHours(parseInt(partes[0]));
data.setMinutes(parseInt(partes[1]));

data.setHours(data.getHours() + Math.floor(horasTotais));
data.setMinutes(data.getMinutes() + (horasTotais % 1) * 60);

horarioFinal = data.toTimeString().slice(0,5);

}

let progresso = (ganhoAtualV/metaV)*100;

barra.style.width = progresso+"%";

progressoTexto.innerHTML =
`Meta: R$ ${ganhoAtualV.toFixed(2)} / R$ ${metaV.toFixed(2)}`;

resultado.innerHTML = `

<p>Lucro por km: R$ ${lucroKm.toFixed(2)}</p>

<p>KM restantes: ${kmNecessarios.toFixed(0)} km</p>

<p>Faturamento necessário: R$ ${faturamento.toFixed(2)}</p>

<p>Combustível necessário: ${litros.toFixed(2)} L</p>

<p>Custo combustível: R$ ${custoComb.toFixed(2)}</p>

<p>Horas estimadas: ${horasTrabalho.toFixed(2)} h</p>

<p class="text-green-400 font-semibold">
Horário estimado de término: ${horarioFinal}
</p>

`;

popup.classList.remove("hidden");
popup.classList.add("flex");

}

function fecharPopup(){
popup.classList.add("hidden");
}

function mostrarDicas(){
dicasPopup.classList.remove("hidden");
dicasPopup.classList.add("flex");
}

function fecharDicas(){
dicasPopup.classList.add("hidden");
}

carregarCache();

</script>

</body>
</html>
